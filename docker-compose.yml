services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: myuniconnect
      POSTGRES_PASSWORD: myuniconnect
      POSTGRES_DB: myuniconnect
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U myuniconnect']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: myuniconnect
      POSTGRES_PASSWORD: myuniconnect
      POSTGRES_DB: myuniconnect_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U myuniconnect']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
